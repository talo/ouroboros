[package]
name = "ouroboros"
edition = "2021"
version.workspace = true

[dependencies]
ouroboros-proc-macro = { path = "../ouroboros-proc-macro" }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }

[features]
default = ["arrow", "serde"]
arrow = []
serde = ["dep:serde", "dep:serde_json"]
